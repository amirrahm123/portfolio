<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BuildLab | קישורים</title>
  <meta name="description" content="BuildLab — בונים אתרים שמביאים לקוחות. צפון הארץ, קוד מותאם, 48 שעות." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Heebo', sans-serif;
      background: #EEEAE0;
      color: #1a1560;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Floating blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 {
      width: 300px; height: 300px;
      background: linear-gradient(135deg, #6c63ff, #a855f7);
      top: -80px; right: -60px;
      animation: float1 8s ease-in-out infinite;
    }
    .blob-2 {
      width: 250px; height: 250px;
      background: linear-gradient(135deg, #a855f7, #6c63ff);
      bottom: -40px; left: -80px;
      animation: float2 10s ease-in-out infinite;
    }
    .blob-3 {
      width: 180px; height: 180px;
      background: linear-gradient(135deg, #6c63ff, #c084fc);
      top: 50%; left: 60%;
      animation: float3 12s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-30px, 40px) scale(1.1); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(40px, -30px) scale(1.15); }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-20px, -20px) scale(0.9); }
    }

    /* Main container */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 48px 24px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      animation: fadeUp 0.8s ease-out;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #1a1560, #6c63ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-symbol {
      -webkit-text-fill-color: #a855f7;
    }

    /* Tagline */
    .tagline {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a1560;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 0.85rem;
      font-weight: 500;
      color: #6b6890;
      margin-bottom: 40px;
      letter-spacing: 0.3px;
    }
    .subtitle span {
      margin: 0 6px;
      opacity: 0.4;
    }

    /* Buttons */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 48px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: 16px;
      font-family: 'Heebo', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #6c63ff, #a855f7);
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 20px rgba(108, 99, 255, 0.25);
      position: relative;
      overflow: hidden;
    }
    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .link-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(108, 99, 255, 0.35);
    }
    .link-btn:hover::before {
      opacity: 1;
    }
    .link-btn:active {
      transform: translateY(0);
    }
    .link-btn .icon {
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    /* WhatsApp button special green tint */
    .link-btn.whatsapp {
      background: linear-gradient(135deg, #25d366, #128c7e);
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.25);
    }
    .link-btn.whatsapp:hover {
      box-shadow: 0 8px 32px rgba(37, 211, 102, 0.35);
    }

    /* Divider dot */
    .divider {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #a855f7);
      margin: 8px auto;
      opacity: 0.4;
    }

    /* Footer */
    .footer {
      position: relative;
      z-index: 1;
      padding: 20px 24px 28px;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 500;
      color: #9995b0;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <!-- Floating blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="container">
    <div class="logo"><span class="logo-symbol">✦</span> BuildLab</div>
    <div class="tagline">בונים אתרים שמביאים לקוחות</div>
    <div class="subtitle">צפון הארץ<span>·</span>קוד מותאם<span>·</span>48 שעות</div>

    <div class="links">
      <a href="https://wa.me/9720527044989" target="_blank" rel="noopener" class="link-btn whatsapp">
        <span class="icon">💬</span>
        וואטסאפ
      </a>
      <a href="mailto:webdevig123@gmail.com" class="link-btn">
        <span class="icon">📩</span>
        שלח מייל
      </a>
      <a href="https://buildlab-il.vercel.app" target="_blank" rel="noopener" class="link-btn">
        <span class="icon">🌐</span>
        האתר שלנו
      </a>
    </div>

    <div class="divider"></div>
  </div>

  <div class="footer">© BuildLab 2025</div>
</body>
</html>
